<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeArena - Home</title>
    <link rel="stylesheet" href="../styles/home_page.css">
    <script src="../scripts/db.js"></script>
</head>
<body>

    <div class="app">

        <!-- TOP NAVIGATION BAR -->
        <div class="top-nav">
            <div class="logo">
                <span class="logo-icon">🚀</span>
                <span class="logo-text">CodeArena</span>
            </div>
            <div class="nav-icons">
                <div class="nav-icon" title="Notifications">🔔</div>
                <div class="nav-icon" title="Profile">👤</div>
                <div class="nav-icon" title="Settings">⚙️</div>
            </div>
        </div>

        <!-- MAIN CONTENT -->
        <div class="main-content">

            <!-- HERO SECTION -->
            <div class="hero">
                <h1>Welcome Back, Coder!</h1>
                <p>Choose what you want to do today</p>
            </div>

            <!-- ACTION BUTTONS -->
            <div class="action-buttons">
                <button id="new-project-btn" class="action-btn primary">
                    <span class="btn-icon">➕</span>
                    <span>New Project</span>
                </button>
                <button class="action-btn">
                    <span class="btn-icon">⚔️</span>
                    <span>1v1 Match</span>
                </button>
                <button class="action-btn">
                    <span class="btn-icon">🎯</span>
                    <span>Practice</span>
                </button>
                <button class="action-btn">
                    <span class="btn-icon">📁</span>
                    <span>Open Folder</span>
                </button>
            </div>

            <!-- SECTION TITLE -->
            <div class="section-header">
                <h2>Recent Projects</h2>
                <a href="#" class="see-all">See all →</a>
            </div>

           <!-- PROJECT CARDS GRID -->
<div class="projects-grid" id="projects-grid">

    <!-- Add New Project Card -->
    <div class="project-card add-new" id="add-new-card">
        <div class="add-icon">➕</div>
        <p>Create New Project</p>
    </div>

</div>
    </div>
<script src="../scripts/home_page.js"></script>
</body>
</html>
