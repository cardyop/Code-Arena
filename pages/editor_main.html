<!DOCTYPE html>
<html lang="en">
<head>
    <script src="../node_modules/monaco-editor/min/vs/loader.js"></script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CodeArena - Editor</title>
    <link rel="stylesheet" href="../styles/editor_main.css">
    <script src="../scripts/db.js"></script>
</head>
<body>

<div class="app">

    <!-- TOP BAR -->
<div class="top-bar">
    <div class="top-actions">
        <button class="run-btn" id="runBtn">▶ Run</button>
    </div>
</div>

    <!-- MAIN AREA -->
    <div class="main-container">

        <!-- LEFT ICON BAR -->
        <div class="icon-bar">
            <div class="icon-btn active" id="iconFiles" title="Files">📁</div>
            <div class="icon-btn" id="iconSearch" title="Search">🔍</div>
            <div class="icon-btn" id="iconExtensions" title="Extensions">🧩</div>
            <div class="spacer"></div>
            <div class="icon-btn" id="iconSave" title="Save">💾</div>
        </div>

        <!-- LEFT PANEL -->
        <div class="left-panel" id="leftPanel">

            <!-- FILES -->
            <div class="panel-section" id="filesPanel">
                <div class="panel-header">
                    <span>EXPLORER</span>
                    <span class="panel-close" id="closePanel">✕</span>
                </div>
                <div class="file-tree" id="fileTree">
                    <div class="folder">
                        <span class="folder-name">📂 <span id="projectName">Project</span></span>
                        <div class="folder-contents" id="folderContents">
                            <div class="file active">📄 main.py</div>
                        </div>
                    </div>
                </div>
                <button class="new-file-btn" id="newFileBtn">+ New File</button>
            </div>

            <!-- SEARCH -->
            <div class="panel-section hidden" id="searchPanel">
                <div class="panel-header">
                    <span>SEARCH</span>
                    <span class="panel-close" id="closeSearch">✕</span>
                </div>
                <input type="text" class="search-input" placeholder="Search in files..." id="searchInput"/>
                <div class="search-results" id="searchResults"></div>
            </div>

            <!-- EXTENSIONS -->
            <div class="panel-section hidden" id="extensionsPanel">
                <div class="panel-header">
                    <span>EXTENSIONS</span>
                    <span class="panel-close" id="closeExtensions">✕</span>
                </div>
                <div class="extension-item">🐍 Python Support</div>
                <div class="extension-item">🌐 JavaScript Support</div>
                <div class="extension-item">⚡ C++ Support</div>
            </div>

        </div>

        <!-- EDITOR + OUTPUT -->
        <!-- EDITOR + OUTPUT -->
<div class="editor-container">

    <!-- FILE TAB -->
    <div class="file-tabs-bar">
        <div class="file-tab active" id="currentTab">
            <span>📄</span>
            <span id="tabName">main.py</span>
            <span class="tab-dot">●</span>
        </div>
    </div>

    <!-- CODE EDITOR -->
    <div class="code-area">
                <div id="monaco-editor" style="width:100%;height:100%;"></div>
            </div>

            <!-- OUTPUT PANEL -->
            <div class="output-panel">
                <div class="output-tabs">
                    <span class="output-tab active" data-tab="output">📟 OUTPUT</span>
                    <span class="output-tab" data-tab="terminal">> TERMINAL</span>
                    <span class="output-tab" data-tab="problems">⚡ PROBLEMS</span>
                </div>
                <div class="output-content" id="outputContent">
                    <div class="output-text">Ready to run code...</div>
                </div>
            </div>

        </div>

    </div>

    <!-- STATUS BAR -->
    <div class="status-bar">
        <div class="status-left">
            <span id="statusLang">🐍 Python</span>
            <span id="statusProject">📁 Project</span>
        </div>
        <div class="status-right">
            <span id="statusCursor">Ln 1, Col 1</span>
            <span>UTF-8</span>
        </div>
    </div>

</div>
<script>
require.config({ paths: { vs: '../node_modules/monaco-editor/min/vs' }});
require(['vs/editor/editor.main'], function() {
    const projectName = localStorage.getItem('current_project_name') || 'Project'
    const savedCode = localStorage.getItem('code_' + projectName) || '# Welcome to CodeArena\n# Write your code here\n\ndef greet(name):\n    return f\'Hello, {name}!\'\n\nprint(greet(\'CodeArena\'))'
    
    window.editor = monaco.editor.create(document.getElementById('monaco-editor'), {
        value: savedCode,
        language: 'python',
        theme: 'vs-dark',
        fontSize: 14,
        fontFamily: 'Consolas, Monaco, monospace',
        minimap: { enabled: true },
        automaticLayout: true,
        scrollBeyondLastLine: false,
        lineNumbers: 'on',
        roundedSelection: true,
        cursorStyle: 'line'
    })

    window.editor.onDidChangeModelContent(() => {
        localStorage.setItem('code_' + projectName, window.editor.getValue())
    })

    window.editor.onDidChangeCursorPosition((e) => {
        document.getElementById('statusCursor').textContent = `Ln ${e.position.lineNumber}, Col ${e.position.column}`
    })
})
</script>

<script src="../scripts/editor_main.js"></script>
</body>
</html>
